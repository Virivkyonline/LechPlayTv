<!doctype html>
<html lang="sk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>LechPlayTV</title>
<style>
:root{--bg:#050814;--text:#f8fafc;--muted:#94a3b8;--line:rgba(255,255,255,.14);--a:#a855f7;--b:#6d28d9}
*{box-sizing:border-box}
body{margin:0;background:radial-gradient(900px 500px at 20% 0%,rgba(168,85,247,.28),transparent 60%),linear-gradient(180deg,#050814,#020617);color:var(--text);font-family:system-ui,Segoe UI,Arial,sans-serif;overflow:hidden}
.app{height:100vh;display:grid;grid-template-rows:auto auto 1fr}
.top{height:96px;display:flex;align-items:center;gap:22px;padding:22px 42px;border-bottom:1px solid var(--line);background:rgba(2,6,23,.78)}
.logo{width:58px;height:58px;border-radius:22px;background:linear-gradient(135deg,var(--a),var(--b));display:grid;place-items:center;font-size:30px;font-weight:1000}
h1{margin:0;font-size:34px}
.status{margin-left:auto;color:var(--muted);font-weight:800}
.search{display:flex;gap:16px;padding:24px 42px}
input{flex:1;font-size:32px;padding:22px 26px;border-radius:26px;border:3px solid transparent;background:rgba(255,255,255,.09);color:#fff;outline:none}
button{font-size:26px;font-weight:1000;border:0;border-radius:26px;padding:20px 28px;color:#fff;background:rgba(255,255,255,.12)}
.focused,input:focus,button:focus,.card.focused{outline:none;border-color:#fff!important;box-shadow:0 0 0 7px rgba(168,85,247,.42),0 22px 70px rgba(0,0,0,.5);transform:scale(1.06)}
.content{padding:4px 42px 42px;overflow:hidden}
.grid{display:grid;grid-template-columns:repeat(5,1fr);gap:28px}
.card{height:330px;border:3px solid transparent;border-radius:30px;background:rgba(255,255,255,.075);overflow:hidden;transition:.12s}
.poster{height:240px;display:grid;place-items:center;background:linear-gradient(135deg,rgba(255,255,255,.12),rgba(255,255,255,.04));font-size:70px}
.poster img{width:100%;height:100%;object-fit:cover}
.title{padding:16px;font-size:22px;font-weight:900;line-height:1.18;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.empty{font-size:34px;color:var(--muted);padding:60px;text-align:center}
.player{position:fixed;inset:0;background:#000;z-index:50;display:none}
.player.active{display:block}
video{width:100%;height:100%;background:#000}
.hint{position:absolute;right:24px;bottom:26px;background:rgba(0,0,0,.62);border:1px solid rgba(255,255,255,.2);border-radius:22px;padding:16px 22px;font-size:20px;font-weight:900}
.progress{position:absolute;left:26px;right:26px;bottom:0;height:8px;background:rgba(255,255,255,.22);border-radius:999px;overflow:hidden}
.progress span{display:block;height:100%;width:0;background:linear-gradient(90deg,var(--a),var(--b))}
@media(max-width:1100px){.grid{grid-template-columns:repeat(4,1fr)}.card{height:300px}.poster{height:215px}}
</style>
</head>
<body>
<div class="app">
  <header class="top">
    <div class="logo">▶</div>
    <div>
      <h1>LechPlayTV</h1>
      <div style="color:var(--muted);font-size:18px;font-weight:800">TV režim bez myši</div>
    </div>
    <div class="status" id="status">Napíš názov a stlač OK</div>
  </header>

  <section class="search">
    <input id="q" placeholder="Hľadať film..." autocomplete="off">
    <button id="searchBtn">Hľadať</button>
  </section>

  <main class="content">
    <div class="grid" id="grid"></div>
    <div class="empty" id="empty">Zadaj názov filmu.</div>
  </main>
</div>

<section class="player" id="player">
  <video id="video" autoplay playsinline></video>
  <div class="hint">OK: play/pause · ◀ ▶: ±10s · ▲ ▼: hlasitosť · Back: zavrieť</div>
  <div class="progress"><span id="bar"></span></div>
</section>

<script>
const API_BASE="https://websharetv-worker.virivkyonlinecz.workers.dev";
let items=[];
let focusIndex=-2; // -2 input, -1 search button, 0+ cards
let playing=null;

const q=document.getElementById("q");
const searchBtn=document.getElementById("searchBtn");
const grid=document.getElementById("grid");
const empty=document.getElementById("empty");
const statusEl=document.getElementById("status");
const player=document.getElementById("player");
const video=document.getElementById("video");
const bar=document.getElementById("bar");

function esc(s){return String(s||"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c]))}
function api(path){return fetch(API_BASE+path,{headers:{accept:"application/json"}}).then(r=>r.json())}
function setStatus(t){statusEl.textContent=t}

function render(){
  grid.innerHTML="";
  empty.style.display=items.length?"none":"block";

  items.forEach((it,i)=>{
    const el=document.createElement("article");
    el.className="card";
    el.dataset.index=i;
    el.innerHTML=`
      <div class="poster">${it.image?`<img src="${esc(it.image)}">`:"▶"}</div>
      <div class="title">${esc(it.title||it.name||"Bez názvu")}</div>
    `;
    grid.appendChild(el);
  });

  if(items.length) focusIndex=0;
  updateFocus();
}

function updateFocus(){
  q.classList.toggle("focused",focusIndex===-2);
  searchBtn.classList.toggle("focused",focusIndex===-1);

  document.querySelectorAll(".card").forEach(card=>{
    card.classList.toggle("focused",Number(card.dataset.index)===focusIndex);
  });

  const active=document.querySelector(".card.focused");
  if(active) active.scrollIntoView({block:"nearest",inline:"nearest"});
}

async function search(){
  const term=q.value.trim();
  if(!term){setStatus("Zadaj názov filmu");return}
  setStatus("Hľadám...");
  empty.style.display="block";
  empty.textContent="Hľadám...";
  grid.innerHTML="";
  items=[];

  try{
    const data=await api("/api/search?q="+encodeURIComponent(term));
    if(data.error) throw new Error(data.message);
    items=(data.items||[]).filter(x=>x.ident);
    empty.textContent=items.length?"":"Nič sa nenašlo.";
    setStatus(items.length ? `Nájdené: ${items.length}` : "Nič sa nenašlo");
    render();
  }catch(e){
    empty.textContent=e.message;
    setStatus("Chyba");
  }
}

async function playItem(it){
  if(!it || !it.ident)return;
  playing=it;
  setStatus("Načítavam prehrávanie...");
  player.classList.add("active");
  video.removeAttribute("src");
  video.load();

  try{
    const data=await api("/api/play?ident="+encodeURIComponent(it.ident));
    if(data.error) throw new Error(data.message);

    const src=data.proxyUrl ? API_BASE+data.proxyUrl : data.videoUrl;
    if(!src) throw new Error("Video link sa nenašiel.");

    video.src=src;
    await video.play().catch(()=>{});
  }catch(e){
    closePlayer();
    setStatus(e.message);
  }
}

function closePlayer(){
  video.pause();
  video.removeAttribute("src");
  video.load();
  player.classList.remove("active");
  updateFocus();
}

function activate(){
  if(player.classList.contains("active")){
    if(video.paused) video.play().catch(()=>{});
    else video.pause();
    return;
  }

  if(focusIndex===-2){
    q.focus();
    return;
  }

  if(focusIndex===-1){
    search();
    return;
  }

  playItem(items[focusIndex]);
}

function move(dx,dy){
  if(player.classList.contains("active"))return;

  const cols=5;

  if(focusIndex===-2){
    if(dx>0) focusIndex=-1;
    if(dy>0 && items.length) focusIndex=0;
  }else if(focusIndex===-1){
    if(dx<0) focusIndex=-2;
    if(dy>0 && items.length) focusIndex=0;
  }else{
    let next=focusIndex + dx + dy*cols;
    if(dy<0 && focusIndex<cols) next=-2;
    next=Math.max(-2,Math.min(items.length-1,next));
    focusIndex=next;
  }

  updateFocus();
}

document.addEventListener("keydown",e=>{
  const key=e.key;

  if(player.classList.contains("active")){
    if(key==="Enter"||key===" "){e.preventDefault();activate()}
    if(key==="Escape"||key==="Backspace"||key==="BrowserBack"){e.preventDefault();closePlayer()}
    if(key==="ArrowRight"){e.preventDefault();video.currentTime=Math.min(video.duration||video.currentTime+10,video.currentTime+10)}
    if(key==="ArrowLeft"){e.preventDefault();video.currentTime=Math.max(0,video.currentTime-10)}
    if(key==="ArrowUp"){e.preventDefault();video.volume=Math.min(1,video.volume+.1)}
    if(key==="ArrowDown"){e.preventDefault();video.volume=Math.max(0,video.volume-.1)}
    return;
  }

  if(key==="ArrowRight"){e.preventDefault();move(1,0)}
  if(key==="ArrowLeft"){e.preventDefault();move(-1,0)}
  if(key==="ArrowDown"){e.preventDefault();move(0,1)}
  if(key==="ArrowUp"){e.preventDefault();move(0,-1)}
  if(key==="Enter"){e.preventDefault();activate()}
  if(key==="Escape"||key==="Backspace"||key==="BrowserBack"){
    e.preventDefault();
    focusIndex=-2;
    q.focus();
    updateFocus();
  }
});

video.addEventListener("timeupdate",()=>{
  if(video.duration) bar.style.width=((video.currentTime/video.duration)*100)+"%";
});

q.addEventListener("keydown",e=>{
  if(e.key==="Enter"){e.preventDefault();search()}
});

searchBtn.onclick=search;

focusIndex=-2;
q.focus();
updateFocus();
</script>
</body>
</html>
