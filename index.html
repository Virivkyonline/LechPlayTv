<!doctype html>
<html lang="sk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>LechPlayTV</title>

<style>
:root{
  --bg:#050814;
  --text:#f8fafc;
  --muted:#94a3b8;
  --line:rgba(255,255,255,.14);
  --glass:rgba(255,255,255,.08);
  --a:#a855f7;
  --b:#6d28d9;
  --focus:rgba(168,85,247,.42);
}

body.theme-blue{--a:#38bdf8;--b:#2563eb;--focus:rgba(56,189,248,.42)}
body.theme-gold{--a:#fbbf24;--b:#f59e0b;--focus:rgba(251,191,36,.42)}
body.theme-green{--a:#34d399;--b:#16a34a;--focus:rgba(52,211,153,.42)}
body.theme-red{--a:#fb7185;--b:#e11d48;--focus:rgba(251,113,133,.42)}
body.theme-purple{--a:#a855f7;--b:#6d28d9;--focus:rgba(168,85,247,.42)}

*{box-sizing:border-box}

body{
  margin:0;
  color:var(--text);
  font-family:system-ui,Segoe UI,Arial,sans-serif;
  overflow:hidden;
  background:
    radial-gradient(950px 520px at 14% -5%, color-mix(in srgb,var(--a) 38%, transparent), transparent 62%),
    radial-gradient(850px 500px at 92% 0%, color-mix(in srgb,var(--b) 30%, transparent), transparent 60%),
    linear-gradient(180deg,#050814,#020617 72%,#000);
}

.app{
  height:100vh;
  display:grid;
  grid-template-rows:auto auto auto 1fr;
}

.top{
  height:108px;
  display:flex;
  align-items:center;
  gap:22px;
  padding:22px 42px;
  border-bottom:1px solid var(--line);
  background:rgba(2,6,23,.78);
  backdrop-filter:blur(22px);
}

.logo{
  width:64px;
  height:64px;
  border-radius:24px;
  background:linear-gradient(135deg,var(--a),var(--b));
  display:grid;
  place-items:center;
  font-size:34px;
  font-weight:1000;
  box-shadow:0 18px 55px color-mix(in srgb,var(--b) 38%, transparent);
}

h1{
  margin:0;
  font-size:38px;
  letter-spacing:-.04em;
}

.subtitle{
  color:var(--muted);
  font-size:18px;
  font-weight:900;
  margin-top:3px;
}

.status{
  margin-left:auto;
  color:var(--muted);
  font-weight:1000;
  font-size:18px;
}

.themes{
  display:flex;
  gap:10px;
  padding:0 42px;
  margin-top:18px;
}

.theme-dot{
  width:42px;
  height:42px;
  border-radius:999px;
  border:3px solid rgba(255,255,255,.28);
  padding:0;
  cursor:pointer;
}

.theme-dot.active{
  border-color:#fff;
  box-shadow:0 0 0 5px var(--focus);
}

.t-purple{background:linear-gradient(135deg,#a855f7,#6d28d9)}
.t-blue{background:linear-gradient(135deg,#38bdf8,#2563eb)}
.t-gold{background:linear-gradient(135deg,#fbbf24,#f59e0b)}
.t-green{background:linear-gradient(135deg,#34d399,#16a34a)}
.t-red{background:linear-gradient(135deg,#fb7185,#e11d48)}

.modebar{
  display:flex;
  gap:22px;
  padding:24px 42px 8px;
}

button{
  font-size:26px;
  font-weight:1000;
  border:3px solid transparent;
  border-radius:28px;
  padding:20px 30px;
  color:#fff;
  background:rgba(255,255,255,.11);
  cursor:pointer;
  transition:.14s ease;
}

.mode{
  min-width:270px;
  font-size:31px;
  padding:25px 34px;
  background:linear-gradient(135deg,rgba(255,255,255,.13),rgba(255,255,255,.055));
  border-color:var(--line);
}

.mode.active{
  background:linear-gradient(135deg,var(--a),var(--b));
  border-color:transparent;
  box-shadow:0 18px 60px color-mix(in srgb,var(--b) 36%, transparent);
}

.search{
  display:flex;
  gap:18px;
  padding:18px 42px 26px;
}

input{
  flex:1;
  font-size:34px;
  padding:24px 30px;
  border-radius:30px;
  border:3px solid var(--line);
  background:rgba(255,255,255,.09);
  color:#fff;
  outline:none;
}

input::placeholder{color:rgba(255,255,255,.42)}

.focused,
input:focus,
button:focus,
.card.focused{
  outline:none;
  border-color:#fff!important;
  box-shadow:0 0 0 7px var(--focus),0 25px 80px rgba(0,0,0,.55);
  transform:scale(1.045);
  z-index:3;
}

.content{
  padding:8px 42px 42px;
  overflow:auto;
}

.grid{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:28px;
  padding-bottom:80px;
}

.card{
  height:340px;
  border:3px solid transparent;
  border-radius:32px;
  background:linear-gradient(180deg,rgba(255,255,255,.11),rgba(255,255,255,.045));
  overflow:hidden;
  transition:.14s ease;
}

.poster{
  height:246px;
  display:grid;
  place-items:center;
  background:linear-gradient(135deg,color-mix(in srgb,var(--a) 20%, transparent),rgba(255,255,255,.04));
  font-size:78px;
}

.poster img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.title{
  padding:17px;
  font-size:22px;
  font-weight:1000;
  line-height:1.18;
  display:-webkit-box;
  -webkit-line-clamp:2;
  -webkit-box-orient:vertical;
  overflow:hidden;
}

.empty{
  font-size:36px;
  color:var(--muted);
  padding:70px;
  text-align:center;
  font-weight:700;
}

.player{
  position:fixed;
  inset:0;
  background:#000;
  z-index:50;
  display:none;
}

.player.active{display:block}

video{
  width:100%;
  height:100%;
  background:#000;
}

.hint{
  position:absolute;
  right:24px;
  bottom:28px;
  background:rgba(0,0,0,.66);
  border:1px solid rgba(255,255,255,.22);
  border-radius:24px;
  padding:17px 24px;
  font-size:20px;
  font-weight:1000;
}

.progress{
  position:absolute;
  left:26px;
  right:26px;
  bottom:0;
  height:8px;
  background:rgba(255,255,255,.22);
  border-radius:999px;
  overflow:hidden;
}

.progress span{
  display:block;
  height:100%;
  width:0;
  background:linear-gradient(90deg,var(--a),var(--b));
}

@media(max-width:1200px){
  .grid{grid-template-columns:repeat(4,1fr)}
  .card{height:320px}
  .poster{height:228px}
}
</style>
</head>

  <link rel="manifest" href="manifest.json">
<link rel="icon" href="icon.svg" type="image/svg+xml">
<body class="theme-purple">
<div class="app">

  <header class="top">
    <div class="logo">▶</div>
    <div>
      <h1>LechPlayTV</h1>
      <div class="subtitle">TV režim bez myši</div>
    </div>
    <div class="status" id="status">Vyber Filmy alebo Hudba</div>
  </header>

  <section class="themes">
    <button class="theme-dot t-purple active" data-theme="purple"></button>
    <button class="theme-dot t-blue" data-theme="blue"></button>
    <button class="theme-dot t-gold" data-theme="gold"></button>
    <button class="theme-dot t-green" data-theme="green"></button>
    <button class="theme-dot t-red" data-theme="red"></button>
  </section>

  <section class="modebar">
    <button id="videoBtn" class="mode active">🎬 Filmy</button>
    <button id="audioBtn" class="mode">🎵 Hudba</button>
  </section>

  <section class="search">
    <input id="q" placeholder="Hľadať film..." autocomplete="off">
    <button id="searchBtn">Hľadať</button>
  </section>

  <main class="content">
    <div class="grid" id="grid"></div>
    <div class="empty" id="empty">Zadaj názov filmu.</div>
  </main>

</div>

<section class="player" id="player">
  <video id="video" autoplay playsinline controls></video>
  <div class="hint">OK: play/pause · ◀ ▶: ±10s · ▲ ▼: hlasitosť · Back: zavrieť</div>
  <div class="progress"><span id="bar"></span></div>
</section>

<script>
const API_BASE="https://websharetv-worker.virivkyonlinecz.workers.dev";

let items=[];
let category="video";
let focusIndex=-4;
// -4 Filmy, -3 Hudba, -2 input, -1 search, 0+ karty

const q=document.getElementById("q");
const searchBtn=document.getElementById("searchBtn");
const videoBtn=document.getElementById("videoBtn");
const audioBtn=document.getElementById("audioBtn");
const grid=document.getElementById("grid");
const empty=document.getElementById("empty");
const statusEl=document.getElementById("status");
const player=document.getElementById("player");
const video=document.getElementById("video");
const bar=document.getElementById("bar");

function esc(s){
  return String(s||"").replace(/[&<>"']/g,c=>({
    "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"
  }[c]));
}

function api(path){
  return fetch(API_BASE+path,{headers:{accept:"application/json"}}).then(r=>r.json());
}

function setStatus(t){
  statusEl.textContent=t;
}

function setTheme(theme){
  document.body.className="theme-"+theme;
  localStorage.setItem("lechplay_theme",theme);
  document.querySelectorAll(".theme-dot").forEach(d=>{
    d.classList.toggle("active",d.dataset.theme===theme);
  });
}

document.querySelectorAll(".theme-dot").forEach(d=>{
  d.onclick=()=>setTheme(d.dataset.theme);
});

setTheme(localStorage.getItem("lechplay_theme")||"purple");

function setCategory(cat){
  category=cat;
  videoBtn.classList.toggle("active",cat==="video");
  audioBtn.classList.toggle("active",cat==="audio");
  q.placeholder=cat==="audio" ? "Hľadať hudbu..." : "Hľadať film...";
  empty.textContent=cat==="audio" ? "Zadaj názov skladby alebo interpreta." : "Zadaj názov filmu.";
  setStatus(cat==="audio" ? "🎵 Hudba" : "🎬 Filmy");
  items=[];
  grid.innerHTML="";
  empty.style.display="block";
  updateFocus();
}

function render(){
  grid.innerHTML="";
  empty.style.display=items.length ? "none" : "block";

  items.forEach((it,i)=>{
    const el=document.createElement("article");
    el.className="card";
    el.dataset.index=i;

    const icon=category==="audio" ? "🎵" : "▶";
    el.innerHTML=`
      <div class="poster">${it.image ? `<img src="${esc(it.image)}">` : icon}</div>
      <div class="title">${esc(it.title||it.name||"Bez názvu")}</div>
    `;

    grid.appendChild(el);
  });

  if(items.length) focusIndex=0;
  updateFocus();
}

function updateFocus(){
  videoBtn.classList.toggle("focused",focusIndex===-4);
  audioBtn.classList.toggle("focused",focusIndex===-3);
  q.classList.toggle("focused",focusIndex===-2);
  searchBtn.classList.toggle("focused",focusIndex===-1);

  document.querySelectorAll(".card").forEach(card=>{
    card.classList.toggle("focused",Number(card.dataset.index)===focusIndex);
  });

  const active=document.querySelector(".card.focused");
  if(active) active.scrollIntoView({block:"nearest",inline:"nearest"});
}

async function search(){
  const term=q.value.trim();
  if(!term){
    setStatus(category==="audio" ? "Zadaj názov hudby" : "Zadaj názov filmu");
    return;
  }

  setStatus(category==="audio" ? "Hľadám hudbu..." : "Hľadám filmy...");
  empty.style.display="block";
  empty.textContent="Hľadám...";
  grid.innerHTML="";
  items=[];

  try{
    const data=await api(
      "/api/search?q="+encodeURIComponent(term)+
      "&category="+encodeURIComponent(category)
    );

    if(data.error) throw new Error(data.message);

    items=(data.items||[]).filter(x=>x.ident);
    empty.textContent=items.length ? "" : "Nič sa nenašlo.";
    setStatus(items.length ? `Nájdené: ${items.length}` : "Nič sa nenašlo");
    render();

  }catch(e){
    empty.textContent=e.message;
    setStatus("Chyba");
  }
}

async function playItem(it){
  if(!it || !it.ident)return;

  setStatus("Načítavam prehrávanie...");
  player.classList.add("active");
  video.removeAttribute("src");
  video.load();

  try{
    const data=await api("/api/play?ident="+encodeURIComponent(it.ident));
    if(data.error) throw new Error(data.message);

    const src=data.proxyUrl ? API_BASE+data.proxyUrl : data.videoUrl;
    if(!src) throw new Error("Link sa nenašiel.");

    video.src=src;
    await video.play().catch(()=>{});

  }catch(e){
    closePlayer();
    setStatus(e.message);
  }
}

function closePlayer(){
  video.pause();
  video.removeAttribute("src");
  video.load();
  player.classList.remove("active");
  updateFocus();
}

function activate(){
  if(player.classList.contains("active")){
    if(video.paused) video.play().catch(()=>{});
    else video.pause();
    return;
  }

  if(focusIndex===-4){
    setCategory("video");
    return;
  }

  if(focusIndex===-3){
    setCategory("audio");
    return;
  }

  if(focusIndex===-2){
    q.focus();
    return;
  }

  if(focusIndex===-1){
    search();
    return;
  }

  playItem(items[focusIndex]);
}

function move(dx,dy){
  if(player.classList.contains("active"))return;

  const cols=5;

  if(dy>0){
    if(focusIndex===-4 || focusIndex===-3){focusIndex=-2}
    else if(focusIndex===-2 || focusIndex===-1){
      if(items.length) focusIndex=0;
    }else{
      focusIndex=Math.min(items.length-1,focusIndex+cols);
    }
  }

  if(dy<0){
    if(focusIndex>=0 && focusIndex<cols) focusIndex=-2;
    else if(focusIndex>=cols) focusIndex=Math.max(0,focusIndex-cols);
    else if(focusIndex===-2 || focusIndex===-1) focusIndex=-4;
  }

  if(dx>0){
    if(focusIndex===-4) focusIndex=-3;
    else if(focusIndex===-2) focusIndex=-1;
    else if(focusIndex>=0) focusIndex=Math.min(items.length-1,focusIndex+1);
  }

  if(dx<0){
    if(focusIndex===-3) focusIndex=-4;
    else if(focusIndex===-1) focusIndex=-2;
    else if(focusIndex>0) focusIndex--;
  }

  updateFocus();
}

document.addEventListener("keydown",e=>{
  const key=e.key;

  if(player.classList.contains("active")){
    if(key==="Enter" || key===" "){
      e.preventDefault();
      activate();
    }
    if(key==="Escape" || key==="Backspace" || key==="BrowserBack"){
      e.preventDefault();
      closePlayer();
    }
    if(key==="ArrowRight"){
      e.preventDefault();
      video.currentTime=Math.min(video.duration||video.currentTime+10,video.currentTime+10);
    }
    if(key==="ArrowLeft"){
      e.preventDefault();
      video.currentTime=Math.max(0,video.currentTime-10);
    }
    if(key==="ArrowUp"){
      e.preventDefault();
      video.volume=Math.min(1,video.volume+.1);
    }
    if(key==="ArrowDown"){
      e.preventDefault();
      video.volume=Math.max(0,video.volume-.1);
    }
    return;
  }

  if(key==="ArrowRight"){e.preventDefault();move(1,0)}
  if(key==="ArrowLeft"){e.preventDefault();move(-1,0)}
  if(key==="ArrowDown"){e.preventDefault();move(0,1)}
  if(key==="ArrowUp"){e.preventDefault();move(0,-1)}
  if(key==="Enter"){e.preventDefault();activate()}

  if(key==="Escape" || key==="Backspace" || key==="BrowserBack"){
    e.preventDefault();
    focusIndex=-4;
    updateFocus();
  }
});

video.addEventListener("timeupdate",()=>{
  if(video.duration) bar.style.width=((video.currentTime/video.duration)*100)+"%";
});

q.addEventListener("keydown",e=>{
  if(e.key==="Enter"){
    e.preventDefault();
    e.stopPropagation();
    search();
  }
});

videoBtn.onclick=()=>setCategory("video");
audioBtn.onclick=()=>setCategory("audio");
searchBtn.onclick=search;

setCategory("video");
focusIndex=-2;
q.focus();
updateFocus();
</script>
</body>
</html>
