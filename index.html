<!doctype html>
<html lang="sk">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>LechPlayTV</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:#0b0b0f;
  color:#fff;
  overflow:auto;
}

/* HEADER */
.header{
  display:flex;
  align-items:center;
  padding:15px 25px;
  background:#000;
  position:sticky;
  top:0;
  z-index:10;
}
.logo{
  font-size:26px;
  font-weight:bold;
  color:red;
  cursor:pointer;
}
.search{
  margin-left:20px;
  flex:1;
}
.search input{
  width:100%;
  padding:10px;
  font-size:18px;
}

/* GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(180px,1fr));
  gap:15px;
  padding:20px;
}
.card{
  background:#111;
  border-radius:12px;
  overflow:hidden;
  cursor:pointer;
  transition:.2s;
}
.card:hover{
  transform:scale(1.05);
}
.card img{
  width:100%;
  height:260px;
  object-fit:cover;
}
.title{
  padding:10px;
}

/* PLAYER */
.player{
  position:fixed;
  inset:0;
  background:#000;
  display:none;
  flex-direction:column;
  z-index:50;
}
.player video{
  width:100%;
  height:100%;
  object-fit:contain;
}

/* CONTROLS */
.controls{
  position:absolute;
  bottom:20px;
  width:100%;
  display:flex;
  justify-content:center;
  gap:20px;
}
.controls button{
  font-size:20px;
  padding:12px 18px;
}

/* OVERLAYS */
.overlay{
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.9);
  display:none;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  z-index:60;
}
.overlay.active{display:flex;}

button{
  font-size:18px;
  padding:10px 20px;
  margin:10px;
}
</style>
</head>

<body>

<div class="header">
  <div class="logo" id="logo">LECHPLAY</div>
  <div class="search">
    <input id="q" placeholder="Hľadať...">
  </div>
  <button onclick="search()">Hľadať</button>
</div>

<div class="grid" id="grid"></div>

<!-- PLAYER -->
<div class="player" id="player">
  <video id="video" controls></video>
  <div class="controls">
    <button onclick="back()">🔙</button>
    <button onclick="seek(-10)">⏪ 10s</button>
    <button onclick="toggle()">▶️/⏸</button>
    <button onclick="seek(10)">⏩ 10s</button>
    <button onclick="stop()">⏹</button>
  </div>
</div>

<!-- PIN -->
<div class="overlay" id="pinBox">
  <h2>Zadaj PIN</h2>
  <input id="pin" type="password">
  <button onclick="checkPin()">OK</button>
</div>

<!-- AGE -->
<div class="overlay" id="ageBox">
  <h2>Máš viac ako 18 rokov?</h2>
  <button onclick="enterAdult()">ÁNO</button>
  <button onclick="closeOverlay()">NIE</button>
</div>

<script>
const API="https://websharetv-worker.virivkyonlinecz.workers.dev";

let items=[];
let clicks=0;
let adult=false;

async function search(){
  let q=document.getElementById("q").value;
  let cat=adult?"adult":"video";

  let res=await fetch(API+"/api/search?q="+q+"&category="+cat);
  let data=await res.json();

  items=data.items||[];
  render();
}

function render(){
  let grid=document.getElementById("grid");
  grid.innerHTML="";
  items.forEach(it=>{
    let d=document.createElement("div");
    d.className="card";
    d.innerHTML=`
      <img src="${it.image||""}">
      <div class="title">${it.title||it.name}</div>
    `;
    d.onclick=()=>play(it);
    grid.appendChild(d);
  });
}

async function play(it){
  let res=await fetch(API+"/api/play?ident="+it.ident);
  let data=await res.json();

  let src=data.proxyUrl?API+data.proxyUrl:data.videoUrl;

  let video=document.getElementById("video");
  video.src=src;

  document.getElementById("player").style.display="flex";
  video.play();
}

/* PLAYER */
function back(){
  stop();
}
function stop(){
  let v=document.getElementById("video");
  v.pause();
  v.src="";
  document.getElementById("player").style.display="none";
}
function toggle(){
  let v=document.getElementById("video");
  v.paused?v.play():v.pause();
}
function seek(s){
  let v=document.getElementById("video");
  v.currentTime+=s;
}

/* SECRET */
document.getElementById("logo").onclick=()=>{
  clicks++;
  if(clicks>=5){
    document.getElementById("pinBox").classList.add("active");
    clicks=0;
  }
};

function checkPin(){
  if(document.getElementById("pin").value==="7808"){
    document.getElementById("pinBox").classList.remove("active");
    document.getElementById("ageBox").classList.add("active");
  }
}

function enterAdult(){
  adult=true;
  closeOverlay();
  alert("🔞 Režim aktivovaný");
}

function closeOverlay(){
  document.getElementById("ageBox").classList.remove("active");
  document.getElementById("pinBox").classList.remove("active");
}
</script>

</body>
</html>
